image: node:18

stages:
  - install
  - build
  - start

cache:
  paths:
    - node_modules/

install_job:
  stage: install
  script:
    - ip a
    - pwd
    - cd /home/admin-zon/Desktop/test/zonbitavn-webnextjs
    - npm ci

build_job:
  stage: build
  script:
    - cd /home/admin-zon/Desktop/test/zonbitavn-webnextjs
    - npm run build

start_job:
  stage: start
  script:
    - cd /home/admin-zon/Desktop/test/zonbitavn-webnextjs
    - npm run build
    - npm run start